# ============================================================================
# 🐧 Build RootFS for Xiaomi Pad 6s Pro (Sheng)
# ============================================================================

name: Build RootFS

on:
  workflow_dispatch:
    inputs:
      distro_suite:
        description: 'Debian Version'
        type: choice
        options:
          - trixie
          - forky
        default: 'trixie'

      desktop:
        description: 'Desktop Environment (server = no DE)'
        type: choice
        options:
          - GNOME
          - KDE
          - server
        default: 'KDE'

      autologin:
        description: 'Autologin'
        type: boolean
        default: true

      username:
        description: 'Username'
        type: string
        default: 'username'

      password:
        description: 'Password (same for root)'
        type: string
        default: 'password'

      hostname:
        description: 'Hostname'
        type: string
        default: 'xiaomi-sheng'

      boot_mode:
        description: |
          Boot mode:
          - single: Boot from partition "userdata"
          - dual: Boot from partition "linux"
          - custom: Boot from custom partition (No prebuilt kernel available)
        type: choice
        options:
          - 'single (userdata)'
          - 'dual (linux)'
          - 'custom'
        default: 'dual (linux)'

      custom_partition:
        description: 'Custom partition (required when boot_mode=custom)'
        type: string
        required: false
        default: ''

      kernel_source:
        description: |
          Kernel Source:
          - prebuilt: ianchb/sm8550-mainline
          - custom_build: Custom repo
        type: choice
        options:
          - 'prebuilt'
          - 'custom_build'
        default: 'prebuilt'

      kernel_repo:
        description: 'Kernel Repo URL (required when kernel_source=custom_build)'
        type: string
        required: false
        default: 'https://github.com/ianchb/sm8550-mainline'

      kernel_branch:
        description: 'Kernel Branch (required when kernel_source=custom_build)'
        type: string
        required: false
        default: 'sheng-7.0.12'

      kernel_config:
        description: 'Kernel Config (required when kernel_source=custom_build)'
        type: string
        required: false
        default: 'sm8550.config'

# ============================================================================
# Build Jobs — each produces one .deb, uploaded as an artifact
# ============================================================================

jobs:
  # ==========================================================================
  # Kernel (conditional on custom_build)
  # ==========================================================================
  build-kernel:
    name: "Build Kernel"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Skip (Prebuilt Kernel)"
        if: ${{ inputs.kernel_source != 'custom_build' }}
        run: echo "✓ Using prebuilt kernel, build skipped"

      - name: "Checkout Repo"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/checkout@v4

      - name: "Install Build Tools"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential flex bison libssl-dev libelf-dev bc \
            ccache clang llvm lld
          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros
          echo "✓ Build tools installed"

      - name: "Restore ccache"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ccache-kernel-${{ inputs.kernel_branch }}-${{ inputs.kernel_config }}-${{ hashFiles(inputs.kernel_config) }}
          restore-keys: |
            ccache-kernel-${{ inputs.kernel_branch }}-${{ inputs.kernel_config }}-
            ccache-kernel-${{ inputs.kernel_branch }}-
            ccache-kernel-

      - name: "Clone Kernel Repo"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          git clone "${{ inputs.kernel_repo }}" \
            --branch "${{ inputs.kernel_branch }}" \
            --depth 1 \
            linux
          echo "✓ Kernel repo cloned"

      - name: "Build Kernel"
        id: build
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export PATH="/usr/lib/ccache:$PATH"
          export CC="ccache clang"
          export CXX="ccache clang++"
          export AR="llvm-ar"
          export NM="llvm-nm"
          export OBJCOPY="llvm-objcopy"
          export OBJDUMP="llvm-objdump"
          export READELF="llvm-readelf"
          export STRIP="llvm-strip"

          cp "${{ github.workspace }}/${{ inputs.kernel_config }}" linux/.config
          cd linux

          make -j$(nproc) ARCH=arm64 LLVM=1

          KVER="$(make kernelrelease -s)"
          echo "kernel_version=$KVER" >> $GITHUB_OUTPUT
          echo "  Kernel version: $KVER"

          make -j$(nproc) ARCH=arm64 LLVM=1 \
            INSTALL_MOD_PATH="${{ github.workspace }}/linux-xiaomi-sheng" \
            modules_install
          rm -rf "${{ github.workspace }}/linux-xiaomi-sheng/lib/modules/"*"/build" || true

          mkdir -p "${{ github.workspace }}/linux-xiaomi-sheng/boot"
          install -Dm644 arch/arm64/boot/Image.gz \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/Image.gz"
          install -Dm644 arch/arm64/boot/dts/qcom/sm8550-xiaomi-sheng.dtb \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/sm8550-xiaomi-sheng.dtb"
          install -Dm644 .config \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/config-${KVER}"
          install -Dm644 System.map \
            "${{ github.workspace }}/linux-xiaomi-sheng/boot/System.map-${KVER}"

          cat arch/arm64/boot/Image.gz \
              arch/arm64/boot/dts/qcom/sm8550-xiaomi-sheng.dtb \
            > "${{ github.workspace }}/Image.gz-dtb_sheng"

          cd "${{ github.workspace }}"
          ccache --show-stats --verbose | grep -E "(hit rate|cache hit|cache miss|max size)" || true
          echo "✓ Kernel build complete"

      - name: "Package Kernel"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          KVER="${{ steps.build.outputs.kernel_version }}"
          mkdir -p linux-xiaomi-sheng/DEBIAN
          cat > linux-xiaomi-sheng/DEBIAN/control << CTRL
          Package: linux-xiaomi-sheng
          Version: ${KVER}
          Architecture: arm64
          Maintainer: map220v
          Section: kernel
          Description: Kernel and Modules for Xiaomi Pad 6s Pro
          CTRL
          dpkg-deb --build --root-owner-group linux-xiaomi-sheng
          echo "✓ linux-xiaomi-sheng.deb packaged"

      - name: "Upload Kernel Package"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/upload-artifact@v4
        with:
          name: kernel-custom-deb
          path: linux-xiaomi-sheng.deb
          retention-days: 3
          if-no-files-found: error

      - name: "Upload Kernel Image"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/upload-artifact@v4
        with:
          name: kernel-custom-image
          path: Image.gz-dtb_sheng
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # fastrpc — Qualcomm FastRPC userspace + adsprpcd-sensorspd.service
  # ==========================================================================
  build-fastrpc:
    name: "Build fastrpc"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config \
            git wget unzip dpkg-dev libyaml-dev linux-libc-dev
          echo "✓ Build tools installed"

      - name: "Download Source"
        run: |
          wget -q https://github.com/qualcomm/fastrpc/archive/refs/tags/v1.0.2.zip
          unzip -q v1.0.2.zip
          echo "✓ Source downloaded"

      - name: "Build fastrpc"
        run: |
          cd fastrpc-1.0.2
          autoreconf -is
          ./configure --prefix=/usr
          make -j$(nproc)
          mkdir -p stage
          make DESTDIR=$PWD/stage install
          echo "✓ fastrpc built"

      - name: "Add systemd Service"
        run: |
          mkdir -p fastrpc-1.0.2/stage/usr/lib/systemd/system
          cp patches/adsprpcd-sensorspd.service fastrpc-1.0.2/stage/usr/lib/systemd/system/
          echo "✓ systemd service added"

      - name: "Package fastrpc"
        run: |
          mkdir -p deb/DEBIAN
          cp -r fastrpc-1.0.2/stage/usr deb/

          cat > deb/DEBIAN/control << EOF
          Package: fastrpc
          Version: 1.0.2-1
          Section: libs
          Priority: optional
          Architecture: arm64
          Maintainer: Fauzan Amir Al Ghiffary <alghiffaryfa19@gmail.com>
          Depends: libyaml-0-2, systemd
          Description: Qualcomm FastRPC userspace library
           FastRPC implementation for Qualcomm DSP communication.
          EOF

          find deb -type d -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb fastrpc_1.0.2-1_arm64.deb
          echo "✓ fastrpc packaged"

      - name: "Upload fastrpc"
        uses: actions/upload-artifact@v4
        with:
          name: fastrpc-deb
          path: fastrpc_*.deb
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # libssc — Qualcomm Sensor Core userspace library
  # ==========================================================================
  build-libssc:
    name: "Build libssc"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build git pkg-config python3-pip \
            libglib2.0-dev libprotobuf-c-dev libqmi-glib-dev libmbim-glib-dev \
            linux-libc-dev protobuf-compiler protobuf-c-compiler
          pip3 install --upgrade meson
          echo "✓ Build tools installed"

      - name: "Clone Source"
        run: |
          git clone https://codeberg.org/DylanVanAssche/libssc.git source
          echo "✓ Source cloned"

      - name: "Apply Patch"
        run: |
          cd source
          cp "${{ github.workspace }}/patches/wait_for_qmi_service.patch" .
          patch -Np1 < wait_for_qmi_service.patch || true
          echo "✓ Patch applied"

      - name: "Build libssc"
        run: |
          cd source
          meson setup build --prefix=/usr
          meson compile -C build
          DESTDIR=$PWD/stage meson install -C build
          echo "✓ libssc built"

      - name: "Package libssc"
        run: |
          mkdir -p deb/DEBIAN deb/usr
          cp -r source/stage/usr/* deb/usr/

          cat > deb/DEBIAN/control << EOF
          Package: libssc
          Version: 0.3.0-1
          Section: libs
          Priority: optional
          Architecture: arm64
          Maintainer: Fauzan Amir Al Ghiffary <alghiffaryfa19@gmail.com>
          Depends: libglib2.0-0, libprotobuf-c1, libqmi-glib5
          Description: Library to expose Qualcomm Sensor Core sensors
           libssc userspace library for Qualcomm SSC.
          EOF

          find deb -type d -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb libssc_0.3.0-1_arm64.deb
          echo "✓ libssc packaged"

      - name: "Upload libssc"
        uses: actions/upload-artifact@v4
        with:
          name: libssc-deb
          path: libssc_*.deb
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # iio-sensor-proxy — patched with Qualcomm SSC support (needs libssc)
  # ==========================================================================
  build-iio-sensor-proxy:
    name: "Build iio-sensor-proxy"
    runs-on: ubuntu-24.04-arm
    needs: [build-libssc]

    steps:
      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ninja-build pkg-config git wget dpkg-dev \
            python3-pip libglib2.0-dev libgudev-1.0-dev \
            libpolkit-gobject-1-dev libsystemd-dev libdbus-1-dev \
            systemd libqmi-glib-dev libmbim-glib-dev \
            linux-libc-dev protobuf-compiler protobuf-c-compiler
          pip3 install --upgrade meson
          echo "✓ Build tools installed"

      - name: "Download libssc"
        uses: actions/download-artifact@v4
        with:
          name: libssc-deb

      - name: "Install libssc"
        run: |
          sudo dpkg -i libssc_*.deb
          sudo ldconfig
          echo "✓ libssc installed"

      - name: "Download Source"
        run: |
          wget -q https://gitlab.freedesktop.org/hadess/iio-sensor-proxy/-/archive/3.9/iio-sensor-proxy-3.9.tar.gz
          tar -xf iio-sensor-proxy-3.9.tar.gz
          echo "✓ Source downloaded"

      - name: "Build iio-sensor-proxy"
        run: |
          cd iio-sensor-proxy-3.9
          meson setup output \
            --prefix=/usr \
            -Db_lto=true \
            -Dssc-support=enabled \
            -Dsystemdsystemunitdir=/usr/lib/systemd/system
          meson compile -C output
          DESTDIR=$PWD/stage meson install --no-rebuild -C output
          echo "✓ iio-sensor-proxy built"

      - name: "Package iio-sensor-proxy"
        run: |
          mkdir -p deb/DEBIAN
          cp -r iio-sensor-proxy-3.9/stage/usr deb/

          cat > deb/DEBIAN/control << EOF
          Package: iio-sensor-proxy
          Version: 99993.9-6
          Section: misc
          Priority: optional
          Architecture: arm64
          Maintainer: Dylan Van Assche <me@dylanvanassche.be>
          Depends: dbus, libglib2.0-0, libgudev-1.0-0, libpolkit-gobject-1-0
          Description: IIO sensors to D-Bus proxy (SSC patched)
           iio-sensor-proxy with Qualcomm SSC support patches.
          EOF

          find deb -type d -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb iio-sensor-proxy_99993.9-6_arm64.deb
          echo "✓ iio-sensor-proxy packaged"

      - name: "Upload iio-sensor-proxy"
        uses: actions/upload-artifact@v4
        with:
          name: iio-sensor-proxy-deb
          path: iio-sensor-proxy_*.deb
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # sheng-sensors — proprietary sensor configuration files
  # ==========================================================================
  build-sheng-sensors:
    name: "Build sheng-sensors"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v4

      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          echo "✓ Build tools installed"

      - name: "Package sheng-sensors"
        run: |
          mkdir -p deb/DEBIAN
          cp -r sheng-sensors-files/usr deb/

          cat > deb/DEBIAN/control << EOF
          Package: sheng-sensors
          Version: 20240917-1
          Section: misc
          Priority: optional
          Architecture: arm64
          Maintainer: Fauzan Amir Al Ghiffary <alghiffaryfa19@gmail.com>
          Description: Sensor files for Xiaomi Mi Pad 6s Pro
           Proprietary sensor configuration files.
          EOF

          find deb -type d -exec chmod 755 {} \;
          find deb -type f -exec chmod 644 {} \;
          dpkg-deb --build deb
          mv deb.deb sheng-sensors_20240917-1_arm64.deb
          echo "✓ sheng-sensors packaged"

      - name: "Upload sheng-sensors"
        uses: actions/upload-artifact@v4
        with:
          name: sheng-sensors-deb
          path: sheng-sensors_*.deb
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # sheng-devauth — keyboard authentication daemon
  # ==========================================================================
  build-sheng-devauth:
    name: "Build sheng-devauth"
    runs-on: ubuntu-24.04-arm

    steps:
      - name: "Checkout Repo"
        uses: actions/checkout@v4

      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev git
          echo "✓ Build tools installed"

      - name: "Clone Source"
        run: |
          git clone https://github.com/map220v/sheng_devauth.git source
          echo "✓ Source cloned"

      - name: "Build Binary"
        run: |
          cd source
          make
          echo "✓ Binary built"

      - name: "Package sheng-devauth"
        run: |
          mkdir -p sheng-devauth/usr/bin
          chmod 0755 source/xiaomi_devauth
          cp source/xiaomi_devauth sheng-devauth/usr/bin/

          cat > sheng-devauth/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl daemon-reload || true
            systemctl enable sheng-devauth.service || true
            systemctl start sheng-devauth.service || true
          fi
          exit 0
          EOF
          chmod 0755 sheng-devauth/DEBIAN/postinst

          cat > sheng-devauth/DEBIAN/prerm << 'EOF'
          #!/bin/sh
          set -e
          if command -v systemctl >/dev/null 2>&1; then
            systemctl stop sheng-devauth.service || true
            systemctl disable sheng-devauth.service || true
          fi
          exit 0
          EOF
          chmod 0755 sheng-devauth/DEBIAN/prerm

          dpkg-deb --build --root-owner-group sheng-devauth
          echo "✓ sheng-devauth packaged"

      - name: "Upload sheng-devauth"
        uses: actions/upload-artifact@v4
        with:
          name: sheng-devauth-deb
          path: sheng-devauth.deb
          retention-days: 3
          if-no-files-found: error

  # ==========================================================================
  # RootFS Assembly — collects every .deb, builds the image
  # ==========================================================================
  build-rootfs:
    name: "Build RootFS"
    runs-on: ubuntu-24.04-arm
    needs:
      - build-kernel
      - build-fastrpc
      - build-libssc
      - build-iio-sensor-proxy
      - build-sheng-sensors
      - build-sheng-devauth
    permissions:
      contents: read
      packages: read

    env:
      ROOTFS_MOUNT: /mnt/rootfs
      IMAGE_SIZE: 10G

    steps:
      # ----------------------------------------------------------------
      # Checkout & Validate
      # ----------------------------------------------------------------

      - name: "Checkout Repo"
        uses: actions/checkout@v4

      - name: "Verify Arguments"
        run: |
          if [[ "${{ inputs.boot_mode }}" == "custom" ]]; then
            if [[ "${{ inputs.kernel_source }}" != "custom_build" ]]; then
              echo "Error: Custom partition requires custom_build kernel"
              exit 1
            fi
            if [[ -z "${{ inputs.custom_partition }}" ]]; then
              echo "Error: custom_partition is required when boot_mode=custom"
              exit 1
            fi
          fi
          echo "✓ Arguments verified"

      - name: "Parse Partition Label"
        id: partition
        run: |
          case "${{ inputs.boot_mode }}" in
            'single (userdata)')
              echo "label=userdata" >> $GITHUB_OUTPUT
              echo "boot_img_pattern=boot_sheng_singleboot.img" >> $GITHUB_OUTPUT
              ;;
            'dual (linux)')
              echo "label=linux" >> $GITHUB_OUTPUT
              echo "boot_img_pattern=boot_sheng_dualboot.img" >> $GITHUB_OUTPUT
              ;;
            'custom')
              echo "label=${{ inputs.custom_partition }}" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "✓ Partition label set"

      # ----------------------------------------------------------------
      # Install Tools
      # ----------------------------------------------------------------

      - name: "Install Build Tools"
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap git curl
          echo "✓ Build tools installed"

      # ----------------------------------------------------------------
      # Acquire Kernel
      # ----------------------------------------------------------------

      - name: "[Prebuilt] Download Kernel"
        if: ${{ inputs.kernel_source != 'custom_build' }}
        run: |
          LATEST_TAG=$(gh release list --repo ianchb/sm8550-mainline --limit 1 --json tagName -q '.[0].tagName')
          echo "  Latest tag: $LATEST_TAG"

          BOOT_PATTERN="${{ steps.partition.outputs.boot_img_pattern }}"
          gh release download "$LATEST_TAG" \
            --repo ianchb/sm8550-mainline \
            --pattern "$BOOT_PATTERN" \
            --clobber
          mv "$BOOT_PATTERN" boot.img

          gh release download "$LATEST_TAG" \
            --repo ianchb/sm8550-mainline \
            --pattern "linux-xiaomi-sheng*.deb" \
            --clobber
          echo "✓ Prebuilt kernel downloaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "[Custom] Download Kernel Package"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/download-artifact@v4
        with:
          name: kernel-custom-deb

      - name: "[Custom] Download Kernel Image"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        uses: actions/download-artifact@v4
        with:
          name: kernel-custom-image

      # ----------------------------------------------------------------
      # Download Build-Job Artifacts
      # ----------------------------------------------------------------

      - name: "Download fastrpc"
        uses: actions/download-artifact@v4
        with:
          name: fastrpc-deb

      - name: "Download libssc"
        uses: actions/download-artifact@v4
        with:
          name: libssc-deb

      - name: "Download iio-sensor-proxy"
        uses: actions/download-artifact@v4
        with:
          name: iio-sensor-proxy-deb

      - name: "Download sheng-sensors"
        uses: actions/download-artifact@v4
        with:
          name: sheng-sensors-deb

      - name: "Download sheng-devauth"
        uses: actions/download-artifact@v4
        with:
          name: sheng-devauth-deb

      # ----------------------------------------------------------------
      # Prepare Inline Packages
      # ----------------------------------------------------------------

      - name: "Package alsa-xiaomi-sheng"
        run: |
          dpkg-deb --build --root-owner-group alsa-xiaomi-sheng
          echo "✓ alsa-xiaomi-sheng.deb packaged"

      - name: "Package firmware-xiaomi-sheng"
        run: |
          git clone --depth 1 https://github.com/map220v/sheng-firmware firmware-src
          mkdir -p firmware-xiaomi-sheng/usr/lib/firmware
          cp -r firmware-src/* firmware-xiaomi-sheng/usr/lib/firmware/
          rm -rf firmware-src
          dpkg-deb --build --root-owner-group firmware-xiaomi-sheng
          echo "✓ firmware-xiaomi-sheng.deb packaged"

      - name: "Download xiaomi-mipps-auth"
        run: |
          LATEST_TAG=$(gh release list --repo ianchb/xiaomi-mipps-auth --limit 1 --json tagName -q '.[0].tagName')
          gh release download "$LATEST_TAG" \
            --repo ianchb/xiaomi-mipps-auth \
            --pattern "*.deb" \
            --clobber
          echo "✓ xiaomi-mipps-auth.deb downloaded"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # Create Image
      # ----------------------------------------------------------------

      - name: "Create RootFS Image"
        run: |
          truncate -s "$IMAGE_SIZE" rootfs.img
          mkfs.ext4 rootfs.img
          echo "✓ RootFS image created (${IMAGE_SIZE})"

      - name: "Mount RootFS Image"
        run: |
          sudo mkdir -p "$ROOTFS_MOUNT"
          sudo mount -o loop rootfs.img "$ROOTFS_MOUNT"
          echo "✓ RootFS image mounted at $ROOTFS_MOUNT"

      # ----------------------------------------------------------------
      # Debootstrap
      # ----------------------------------------------------------------

      - name: "Run Debootstrap (${{ inputs.distro_suite }})"
        run: |
          sudo debootstrap \
            --arch=arm64 \
            --components=main,contrib,non-free-firmware \
            "${{ inputs.distro_suite }}" \
            "$ROOTFS_MOUNT" \
            http://deb.debian.org/debian/
          echo "✓ Debootstrap complete"

      - name: "Mount Virtual File Systems"
        run: |
          sudo mount --bind /dev "$ROOTFS_MOUNT/dev"
          sudo mount --bind /dev/pts "$ROOTFS_MOUNT/dev/pts"
          sudo mount -t proc proc "$ROOTFS_MOUNT/proc"
          sudo mount -t sysfs sys "$ROOTFS_MOUNT/sys"
          sudo cp /etc/resolv.conf "$ROOTFS_MOUNT/etc/resolv.conf"
          echo "✓ Virtual file systems mounted"

      # ----------------------------------------------------------------
      # Install Packages
      # ----------------------------------------------------------------

      - name: "Install Base Packages"
        run: |
          sudo chroot "$ROOTFS_MOUNT" apt-get update
          sudo chroot "$ROOTFS_MOUNT" apt-get install -y \
            systemd systemd-sysv \
            sudo vim wget curl \
            network-manager openssh-server \
            wpasupplicant dbus \
            ca-certificates \
            chrony \
            net-tools \
            libglib2.0-0 \
            libprotobuf-c1 \
            libqmi-glib5 \
            libmbim-glib4 \
            libyaml-0-2 \
            libgudev-1.0-0 \
            libpolkit-gobject-1-0
          echo "✓ Base packages installed"

      - name: "Install All .deb Packages"
        run: |
          sudo cp ./*.deb "$ROOTFS_MOUNT/tmp/"

          echo "  Packages to install:"
          sudo ls -lah "$ROOTFS_MOUNT/tmp/"*.deb

          sudo chroot "$ROOTFS_MOUNT" bash -c "
            apt-get update
            apt-get install -y /tmp/*.deb 2>&1 || apt-get install -f -y
            rm /tmp/*.deb
          "
          echo "✓ All .deb packages installed"

      # ----------------------------------------------------------------
      # System Tuning
      # ----------------------------------------------------------------

      - name: "Fix adsprpcd Permissions"
        run: |
          if [ -f "$ROOTFS_MOUNT/usr/bin/adsprpcd" ]; then
            sudo chmod +x "$ROOTFS_MOUNT/usr/bin/adsprpcd"
            echo "✓ adsprpcd permissions fixed"
          else
            echo "  /usr/bin/adsprpcd not found, skipped"
          fi

      - name: "Set Hostname"
        run: |
          echo "${{ inputs.hostname }}" | sudo tee "$ROOTFS_MOUNT/etc/hostname"
          if ! grep -q "127.0.1.1.*${{ inputs.hostname }}" "$ROOTFS_MOUNT/etc/hosts"; then
            echo "127.0.1.1 ${{ inputs.hostname }}" | sudo tee -a "$ROOTFS_MOUNT/etc/hosts"
          fi
          echo "✓ Hostname set to ${{ inputs.hostname }}"

      - name: "Create User"
        run: |
          sudo chroot "$ROOTFS_MOUNT" useradd \
            -m -s /bin/bash \
            -G sudo \
            "${{ inputs.username }}"
          echo "✓ User ${{ inputs.username }} created"

      - name: "Set Passwords"
        run: |
          echo "${{ inputs.username }}:${{ inputs.password }}" | \
            sudo chroot "$ROOTFS_MOUNT" chpasswd
          echo "root:${{ inputs.password }}" | \
            sudo chroot "$ROOTFS_MOUNT" chpasswd
          echo "✓ Passwords set"

      # ----------------------------------------------------------------
      # Desktop Environment
      # ----------------------------------------------------------------

      - name: "Install GNOME"
        if: ${{ inputs.desktop == 'GNOME' }}
        run: |
          sudo chroot "$ROOTFS_MOUNT" apt-get update
          sudo chroot "$ROOTFS_MOUNT" apt-get install -y \
            gnome-shell gnome-session gnome-terminal \
            gdm3 firefox-esr \
            gnome-control-center
          echo "✓ GNOME installed"

      - name: "Install KDE Plasma"
        if: ${{ inputs.desktop == 'KDE' }}
        run: |
          sudo chroot "$ROOTFS_MOUNT" apt-get update
          sudo chroot "$ROOTFS_MOUNT" apt-get install -y \
            plasma-desktop plasma-workspace plasma-nm \
            sddm konsole firefox-esr \
            dolphin kate
          echo "✓ KDE Plasma installed"

      - name: "Configure GDM"
        if: ${{ inputs.desktop == 'GNOME' && (!inputs.autologin) }}
        run: |
          sudo chroot "$ROOTFS_MOUNT" systemctl enable gdm3
          sudo chroot "$ROOTFS_MOUNT" systemctl set-default graphical.target
          echo "✓ GDM enabled (manual login)"

      - name: "Configure SDDM"
        if: ${{ inputs.desktop == 'KDE' && (!inputs.autologin) }}
        run: |
          sudo chroot "$ROOTFS_MOUNT" systemctl enable sddm
          sudo chroot "$ROOTFS_MOUNT" systemctl set-default graphical.target
          echo "✓ SDDM enabled (manual login)"

      - name: "Configure GDM with Autologin"
        if: ${{ inputs.desktop == 'GNOME' && inputs.autologin }}
        run: |
          sudo mkdir -p "$ROOTFS_MOUNT/etc/gdm3"
          sudo tee "$ROOTFS_MOUNT/etc/gdm3/daemon.conf" << EOF
          [daemon]
          AutomaticLoginEnable=true
          AutomaticLogin=${{ inputs.username }}
          EOF
          sudo chroot "$ROOTFS_MOUNT" systemctl enable gdm3
          sudo chroot "$ROOTFS_MOUNT" systemctl set-default graphical.target
          echo "✓ GDM autologin configured for ${{ inputs.username }}"

      - name: "Configure SDDM with Autologin"
        if: ${{ inputs.desktop == 'KDE' && inputs.autologin }}
        run: |
          sudo mkdir -p "$ROOTFS_MOUNT/etc/sddm.conf.d"
          sudo tee "$ROOTFS_MOUNT/etc/sddm.conf.d/autologin.conf" << EOF
          [Autologin]
          User=${{ inputs.username }}
          Session=plasma
          EOF
          sudo chroot "$ROOTFS_MOUNT" systemctl enable sddm
          sudo chroot "$ROOTFS_MOUNT" systemctl set-default graphical.target
          echo "✓ SDDM autologin configured for ${{ inputs.username }}"

      - name: "Enable NetworkManager"
        run: |
          sudo chroot "$ROOTFS_MOUNT" systemctl enable NetworkManager
          echo "✓ NetworkManager enabled"

      # ----------------------------------------------------------------
      # Finalize & Unmount
      # ----------------------------------------------------------------

      - name: "Configure fstab"
        run: |
          PARTITION="${{ steps.partition.outputs.label }}"
          echo "PARTLABEL=$PARTITION / ext4 defaults 0 1" | \
            sudo tee "$ROOTFS_MOUNT/etc/fstab"
          echo "✓ fstab configured: root=PARTLABEL=$PARTITION"

      - name: "Clean APT Cache"
        run: |
          sudo chroot "$ROOTFS_MOUNT" apt-get clean
          sudo rm -f "$ROOTFS_MOUNT/etc/resolv.conf"
          echo "✓ APT cache cleaned"

      - name: "Unmount Virtual File Systems"
        if: always()
        run: |
          sudo umount "$ROOTFS_MOUNT/dev/pts" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT/dev" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT/proc" 2>/dev/null || true
          sudo umount "$ROOTFS_MOUNT/sys" 2>/dev/null || true
          echo "✓ Virtual file systems unmounted"

      - name: "Unmount Image & Set UUID"
        run: |
          sudo umount "$ROOTFS_MOUNT" 2>/dev/null || true
          tune2fs -U ee8d3593-59b1-480e-a3b6-4fefb17ee7d8 rootfs.img || true
          echo "✓ Image unmounted, UUID set"

      # ----------------------------------------------------------------
      # Boot Image (custom kernel only)
      # ----------------------------------------------------------------

      - name: "[Custom] Generate boot.img"
        if: ${{ inputs.kernel_source == 'custom_build' }}
        run: |
          PARTITION="${{ steps.partition.outputs.label }}"
          chmod +x mkbootimg
          ./mkbootimg \
            --kernel Image.gz-dtb_sheng \
            --cmdline "root=PARTLABEL=$PARTITION" \
            --base 0x00000000 \
            --kernel_offset 0x00008000 \
            --tags_offset 0x01e00000 \
            --pagesize 4096 \
            --id \
            -o boot.img
          echo "✓ boot.img generated (cmdline: root=PARTLABEL=$PARTITION)"

      # ----------------------------------------------------------------
      # Upload Final Artifacts
      # ----------------------------------------------------------------

      - name: "Upload RootFS Image"
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ inputs.distro_suite }}-${{ inputs.desktop }}-${{ steps.partition.outputs.label }}
          path: rootfs.img
          retention-days: 14
          if-no-files-found: error
          compression-level: 1

      - name: "Upload Boot Image"
        uses: actions/upload-artifact@v4
        with:
          name: boot-${{ inputs.distro_suite }}-${{ inputs.desktop }}-${{ steps.partition.outputs.label }}
          path: boot.img
          retention-days: 14
          if-no-files-found: warn
          compression-level: 1
